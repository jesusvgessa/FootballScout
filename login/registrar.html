<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="fontawesome-free-5.15.4-web/css/all.min.css">
    <link rel="stylesheet" href="../css/cabecera.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/formularios.css">
    <title>Registrar</title>
</head>

<body>
    <header>
        <a href="../index.html"><img src="../img/logo.png" alt="Logo de Football Scout" class="logo"></a>
        <a href="#" class="usuario"><img src="../img/user.png" alt="imagen de usuario"></a>
    </header>

    <section>
        <article class="primerLogin">

            <h2>Completa el registro</h2>

            <div class="formulario">

                <form action="../Entrenador/inicioEntrenador.html" class="entrar" id="registro">

                    <input type="text" placeholder="Nombre" id="nombre" required><br>
                    <input type="text" placeholder="Apellidos" id="apellidos" required><br>
                    <input type="number" placeholder="Telefono" id="tef" minlength="9" maxlength="9" required><br>
                    <input type="text" placeholder="DNI" id="dni" required><br>

                    <div class="cambioPerfil">
                        <input class="botonRadio" type="radio" name="slide" id="entrenador" checked>
                        <input class="botonRadio" type="radio" name="slide" id="jugador">
                        <label for="entrenador" class="entrenador">Entrenador</label>
                        <label for="jugador" class="jugador">Jugador</label>
                        <div class="cambioBoton"></div>
                    </div>

                    <div name="eligeClub">
                        <label for="club">Busca tu club: </label>
                        <input type="text" placeholder="Club"><br>
                        <div id="clubEntrenador">
                            <input type="submit" value="Añadir club">
                        </div><br>
                        <input type="radio" name="club" id="club1" value="club1">
                        <label for="club1">Club1</label><br>
                        <input type="radio" name="club" id="club2" value="club2">
                        <label for="club2">Club2</label><br>
                        <input type="radio" name="club" id="club3" value="club3">
                        <label for="club3">Club3</label><br>
                        <button type="button" onclick="elegirClub()" class="botonClub">Elegir club</button>
                    </div>

                    <div id="equipo">
                        <label for="club">Busca tu equipo: </label>
                        <input type="text" placeholder="Equipo" name="equipo" id="equipo"><br>
                        <div id="equipoEntrenador">
                            <input type="submit" value="Añadir equipo">
                        </div><br>
                        <input type="radio" name="equipo" id="equipo1">
                        <label for="equipo1">Equipo1</label><br>
                        <input type="radio" name="equipo" id="equipo2">
                        <label for="equipo2">Equipo2</label><br>
                        <input type="radio" name="equipo" id="equipo3">
                        <label for="equipo3">Equipo3</label>
                    </div>

                    <div id="errores"></div><br>

                    <input type="submit" value="Registrarse" class="botonRegistrar">
                </form>

            </div>

        </article>

    </section>

    <footer>
        <div class="redes">
            <h3>Redes sociales</h3>
            <ul>
                <li><i class="fab fa-instagram"></i></li>
                <li><i class="fab fa-twitter"></i></li>
                <li><i class="fab fa-facebook-square"></i></li>
            </ul>
        </div>
        <div class="nosotros">
            <h3>Sobre nosotros</h3>
            <p>somos unos crackens</p>
        </div>
        <div class="avisos">
            <h3>Avisos legales</h3>
            <ul>
                <li>FAQ</li>
                <li>Condiciones de uso</li>
                <li>Otras cosas</li>
            </ul>
        </div><br>
        <hr>
        <p class="copy">Copyright &copy; 2021 Todos los derechos reservados JesusVazquez S.A.</p>
    </footer>

    <script src="../js/registrar.js"></script>
</body>

</html>
